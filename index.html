<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Imposter</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- SCREEN 1: Player Count -->
  <div class="screen active" id="screen-count">
    <div class="spacer"></div>
    <h1>Impos<span>ter</span></h1>
    <p class="subtitle">How many players are joining?</p>
    <div class="count-display">
      <button class="stepper" id="btn-minus">−</button>
      <span id="player-count-display">4</span>
      <button class="stepper" id="btn-plus">+</button>
    </div>
    <div class="spacer"></div>
    <button class="btn-primary" id="btn-count-next">Let's go</button>
  </div>

  <!-- SCREEN 2: Player Names -->
  <div class="screen" id="screen-names">
    <h2>Who's playing?</h2>
    <p class="subtitle">Enter each player's name below.</p>
    <div id="name-fields"></div>
    <div class="spacer"></div>
    <button class="btn-primary" id="btn-names-next">Continue</button>
  </div>

  <!-- SCREEN 3: Word Entry (per player) -->
  <div class="screen" id="screen-words">
    <div class="pill accent subtitle" id="word-entry-label"></div>
    <h2 id="word-entry-title"></h2>
    <p class="subtitle" id="word-entry-subtitle"></p>
    <div id="word-fields"></div>
    <div class="spacer"></div>
    <button class="btn-primary" id="btn-words-submit">Submit</button>
  </div>

  <!-- SCREEN 4: Pass Phone -->
  <div class="screen" id="screen-pass">
    <div class="spacer"></div>
    <div class="pass-icon-wrap">📱</div>
    <h2 id="pass-title"></h2>
    <p class="subtitle" id="pass-subtitle"></p>
    <div class="spacer"></div>
    <button class="btn-primary" id="btn-pass-ready">I'm ready</button>
  </div>

  <!-- SCREEN 5: Role Reveal (per player) -->
  <div class="screen" id="screen-role">
    <div class="spacer"></div>
    <div class="pill accent" id="role-player-label"></div>
    <h2>Your role</h2>
    <p class="subtitle">Only you should be looking at the screen.</p>
    <button class="btn-reveal" id="btn-reveal-role">Tap to reveal</button>
    <div class="role-result hidden" id="role-result">
      <div id="role-content"></div>
      <button class="btn-secondary" id="btn-role-next">Done — pass the phone</button>
    </div>
    <div class="spacer"></div>
  </div>

  <!-- SCREEN 6: Round Reveal -->
  <div class="screen" id="screen-round-reveal">
    <div class="spacer"></div>
    <div class="pill accent">Round over</div>
    <h2>Time for the big reveal</h2>
    <p class="subtitle">Show everyone — who was the imposter?</p>
    <button class="btn-reveal" id="btn-show-reveal">Reveal</button>
    <div class="reveal-result hidden" id="reveal-result">
      <div class="reveal-block">
        <span class="reveal-label">Imposter</span>
        <span class="reveal-value" id="reveal-imposter"></span>
      </div>
      <div class="reveal-block">
        <span class="reveal-label">The word was</span>
        <span class="reveal-value" id="reveal-word"></span>
      </div>
      <button class="btn-primary" id="btn-play-again">Play again</button>
    </div>
    <div class="spacer"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
